name: Deploy Trend Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: make PYTHON=python test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Pages artifact
        run: |
          mkdir -p _site/docs
          cp -R site/. _site/
          cp docs/recent_trend_summary_enriched.md _site/docs/
          cp docs/manual_validation_gate.md _site/docs/
          cp docs/classification_diagnostics_enriched.md _site/docs/
          cp docs/data_documentation.md _site/docs/
          cp REPLICATION.md _site/
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/data.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
