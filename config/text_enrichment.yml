minimum_usable_text_chars: 250
candidate_category: insufficient_text

default_sources:
  - openalex
  - crossref
  - semantic_scholar
  - econpapers
  - publisher_metadata
  - unpaywall

source_sleep_seconds:
  openalex: 0.15
  crossref: 0.25
  semantic_scholar: 1.25
  econpapers: 0.25
  publisher_metadata: 0.10
  unpaywall: 0.25

source_timeout_seconds: 45
source_timeout_seconds_by_source:
  econpapers: 12
  publisher_metadata: 6

article_scope_patterns:
  review_erratum_paratext:
    - '^front matter$'
    - '^back matter$'
    - '^abstracts$'
    - '^accepted manuscripts$'
    - '^announcements$'
    - '^announcement$'
    - '^errata$'
    - '^erratum$'
    - '^erratum\b'
    - '^erratum to:'
    - '^correction to:'
    - '^correction:'
    - '\ba correction$'
    - ': erratum$'
    - '^corrigendum$'
    - '^corrigendum to:'
    - '^corrigendum\b'
    - '^online corrigendum\b'
    - '^supplement to\b'
    - '^retraction of:'
    - '^retraction of\b'
    - '^addendum$'
    - '^back cover$'
    - '^index$'
    - '^index to volume'
    - '^forthcoming papers$'
    - '^news notes$'
    - '^books received$'
    - '^volume contents$'
    - '^notes and comments$'
    - '^submission of manuscripts'
    - '^fellows of the econometric society'
    - '^the econometric society [0-9]{4} annual report'
    - 'annual report of the president'
    - '^election of fellows'
    - '\belection of fellows\b'
    - '^general information on the association$'
    - '^proceedings of'
    - '^recent referees$'
    - '^in memoriam:'
    - '^jpe turnaround times$'
    - '^masthead$'
    - '^minutes of'
    - '^committee on'
